name: Backend CI Quality Gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies and QA tools
      run: |
        python -m pip install --upgrade pip
        # Install development QA and security tools directly in the CI runner
        pip install ruff mypy bandit pip-audit
        # Install application dependencies
        pip install -r backend-service/requirements.txt

    - name: Check code formatting (Ruff)
      run: ruff format --check backend-service/

    - name: Lint codebase (Ruff)
      run: ruff check backend-service/

    - name: Static Type Checking (Mypy)
      run: mypy --ignore-missing-imports backend-service/

    - name: Security Scanning (Bandit SAST)
      run: bandit -r backend-service/ -ll -ii

    - name: Dependency Auditing (Pip-audit SCA)
      run: pip-audit -r backend-service/requirements.txt
