version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pengu_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pengu_user
      POSTGRES_PASSWORD: pengu_pass
      POSTGRES_DB: pengu_db
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pengu_user -d pengu_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend-service
      dockerfile: Dockerfile
    container_name: pengu_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pengu_user:pengu_pass@db:5432/pengu_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
